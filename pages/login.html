<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Smart Complaint System</title>
    <link rel="stylesheet" href="../css/style.css">
    <script>
        (function () {
            const saved = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', saved);
        })();
    </script>
</head>

<body class="login-body">
    <div class="login-card">
        <h2>Welcome Back</h2>
        <p>Log in to access your dashboard</p>

        <form onsubmit="handleLogin(event)">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="example@college.com" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-primary" id="login-btn">Sign In to Account</button>

            <div class="auth-footer">
                <p>Don't have an account? <a href="signup.html">Create one</a></p>
            </div>
        </form>
    </div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById("login-btn");
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            btn.disabled = true;
            btn.innerHTML = "Authenticating...";

            try {
                const response = await fetch("https://complaint-backend-5rdk.onrender.com/api/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    sessionStorage.setItem("userEmail", data.email);
                    sessionStorage.setItem("userRole", data.role);

                    if (data.role === "ADMIN") {
                        window.location.href = "admin_dashboard.html";
                    } else if (data.role === "STAFF") {
                        window.location.href = "staff_dashboard.html";
                    } else {
                        window.location.href = "student_dashboard.html";
                    }
                } else {
                    const errorMsg = await response.text();
                    alert("Login Failed: " + errorMsg);
                    btn.disabled = false;
                    btn.innerHTML = "Sign In to Account";
                }
            } catch (err) {
                console.error(err);
                alert("Server error! Backend check kijiye.");
                btn.disabled = false;
                btn.innerHTML = "Sign In to Account";
            }
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateThemeIcon(next);
        }
        function updateThemeIcon(theme) {
            const icon = document.getElementById('themeIcon');
            if (theme === 'dark') {
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>';
            } else {
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>';
            }
        }
        window.addEventListener('DOMContentLoaded', () => {
            updateThemeIcon(document.documentElement.getAttribute('data-theme'));
        });
    </script>

    <button class="theme-toggle" onclick="toggleTheme()" id="themeToggleBtn" title="Toggle Dark/Light Mode">
        <svg id="themeIcon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
        </svg>
    </button>
</body>

</html>
