<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Smart Complaint</title>
    <link rel="stylesheet" href="../css/style.css">
    <script>
        (function () {
            const saved = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', saved);
        })();
    </script>
</head>

<body class="dashboard-body">

    <button class="menu-toggle" id="menu-toggle">☰</button>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>Profile Settings</h3>
        </div>
        <nav style="display: flex; flex-direction: column; width: 100%;">
            <a href="#" onclick="goBack()">🔙 Back to Dashboard</a>
            <a href="#" onclick="logout()">🚪 Logout</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="top-navbar">
            <div class="nav-links">
                <a href="#" onclick="goBack()" class="nav-item">Dashboard</a>
                <a href="#" class="nav-item active">Profile</a>
            </div>
            <div class="nav-actions">
                <button class="nav-icon-btn d-mobile-flex" onclick="goBack()"
                    style="background: var(--primary); color: white; border: none; padding: 10px 16px; border-radius: 50px; font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 8px;">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 16px; height: 16px;">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                    </svg>
                    Back to Dashboard
                </button>
                <div class="user-profile" onclick="goBack()" style="cursor: pointer;">
                    <div class="user-avatar" id="nav-avatar" style="transition: all 0.3s;">U</div>
                    <div
                        style="display: flex; flex-direction: column; align-items: flex-start; justify-content: center; padding-right: 5px;">
                        <span
                            style="font-size: 10px; color: var(--text-muted); line-height: 1; margin-bottom: 3px;">Welcome,</span>
                        <span id="nav-email"
                            style="font-size: 13px; font-weight: 700; line-height: 1;">Loading...</span>
                    </div>
                </div>
                <button class="nav-icon-btn" onclick="toggleTheme()" id="themeToggleBtn" title="Toggle Dark/Light Mode">
                    <svg id="themeIcon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z">
                        </path>
                    </svg>
                </button>
            </div>
        </div>

        <div class="dashboard-header">
            <h2>Account Settings</h2>
            <p style="color: var(--text-muted);">Manage your personal details and security</p>
        </div>

        <div style="display: flex; gap: 30px; flex-wrap: wrap; margin-top: 20px;">
            <div class="login-card"
                style="width: 100%; max-width: 500px; padding: 30px; border-top: 4px solid var(--primary); margin: 0;">
                <h4 style="text-align: left; margin-bottom: 20px;">Update Profile Details</h4>

                <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 24px;">
                    <div id="profile-picture-container" style="
                        width: 80px; 
                        height: 80px; 
                        border-radius: 50%; 
                        background: var(--primary-light); 
                        color: var(--primary); 
                        font-size: 32px; 
                        font-weight: 800; 
                        display: flex; 
                        align-items: center; 
                        justify-content: center;
                        background-size: cover;
                        background-position: center;
                        cursor: pointer;
                        border: 2px solid var(--primary);
                        box-shadow: var(--shadow-sm);
                    " onclick="document.getElementById('dp-upload').click()">U</div>

                    <div>
                        <input type="file" id="dp-upload" accept="image/*" style="display: none;"
                            onchange="uploadProfilePicture(event)">
                        <button type="button" class="btn-secondary" style="padding: 8px 16px; font-size: 13px;"
                            onclick="document.getElementById('dp-upload').click()">Change Picture</button>
                        <p style="font-size: 12px; color: var(--text-muted); margin-top: 5px;">Click or tap avatar to
                            edit (Max 5MB)</p>
                    </div>
                </div>

                <form id="profileForm">
                    <div class="form-group">
                        <label>Role</label>
                        <input type="text" id="role" disabled
                            style="background: var(--bg-body); cursor: not-allowed; opacity: 0.7;">
                    </div>
                    <div class="form-group" id="dept-group" style="display: none;">
                        <label>Department / Category</label>
                        <input type="text" id="department" disabled
                            style="background: var(--bg-body); cursor: not-allowed; opacity: 0.7; color: var(--info);">
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" disabled
                            style="background: var(--bg-body); cursor: not-allowed; opacity: 0.7;">
                    </div>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="name" required>
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%;">Save Changes</button>
                </form>
            </div>

            <div class="login-card"
                style="width: 100%; max-width: 500px; padding: 30px; border-top: 4px solid var(--warning); margin: 0;">
                <h4 style="text-align: left; margin-bottom: 20px;">Change Password</h4>
                <form id="passwordForm">
                    <div class="form-group">
                        <label>Current Password</label>
                        <input type="password" id="oldPassword" required>
                    </div>
                    <div class="form-group">
                        <label>New Password</label>
                        <input type="password" id="newPassword" required>
                    </div>
                    <button type="submit" class="btn-primary" style="background: var(--warning); width: 100%;">Update
                        Password</button>
                </form>
            </div>
        </div>

    </div>

    <script>
        const menuBtn = document.getElementById("menu-toggle");
        const sidebar = document.getElementById("sidebar");

        if (menuBtn) {
            menuBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                sidebar.classList.toggle("active");
                menuBtn.innerText = sidebar.classList.contains("active") ? "✕" : "☰";
            });
        }

        async function initProfile() {
            const email = sessionStorage.getItem("userEmail");
            if (!email) {
                window.location.href = "login.html";
                return;
            }

            document.getElementById("nav-email").innerText = email;
            document.getElementById("nav-avatar").innerText = email.charAt(0).toUpperCase();

            try {
                const res = await fetch("https://complaint-backend-5rdk.onrender.com/api/v1/profile", {
                    headers: { "User-Email": email }
                });

                if (res.ok) {
                    const data = await res.json();
                    document.getElementById("name").value = data.name;
                    document.getElementById("email").value = data.email;
                    document.getElementById("role").value = data.role;

                    const deptGroup = document.getElementById("dept-group");
                    const deptInput = document.getElementById("department");

                    if (data.role === 'STAFF') {
                        deptGroup.style.display = "block";
                        deptInput.value = data.department ? data.department : "General (Unassigned)";
                    } else if (data.role === 'ADMIN') {
                        deptGroup.style.display = "block";
                        deptGroup.querySelector('label').innerText = "System Privileges";
                        deptInput.value = "Full Control / All Access";
                    } else {
                        deptGroup.style.display = "none";
                    }

                    if (data.profilePictureUrl) {
                        const fullUrl = `https://complaint-backend-5rdk.onrender.com${data.profilePictureUrl}`;
                        document.getElementById("profile-picture-container").style.backgroundImage = `url('${fullUrl}')`;
                        document.getElementById("profile-picture-container").innerText = '';

                        document.getElementById("nav-avatar").style.backgroundImage = `url('${fullUrl}')`;
                        document.getElementById("nav-avatar").style.backgroundSize = "cover";
                        document.getElementById("nav-avatar").innerText = '';
                    } else {
                        // Reset to generic initials if not found
                        const initial = data.name ? data.name.charAt(0).toUpperCase() : email.charAt(0).toUpperCase();
                        document.getElementById("profile-picture-container").innerText = initial;
                        document.getElementById("profile-picture-container").style.backgroundImage = '';

                        document.getElementById("nav-avatar").innerText = initial;
                        document.getElementById("nav-avatar").style.backgroundImage = '';
                    }
                }
            } catch (err) {
                console.error(err);
                alert("Cannot connect to server to fetch profile");
            }
        }

        document.getElementById("profileForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = sessionStorage.getItem("userEmail");
            const newName = document.getElementById("name").value;

            try {
                const res = await fetch("https://complaint-backend-5rdk.onrender.com/api/v1/profile/update", {
                    method: "PATCH",
                    headers: {
                        "Content-Type": "application/json",
                        "User-Email": email
                    },
                    body: JSON.stringify({ name: newName })
                });

                if (res.ok) {
                    alert("Profile Name Updated Successfully! ✅");
                } else {
                    alert("Update failed.");
                }
            } catch (err) {
                console.error(err);
            }
        });

        async function uploadProfilePicture(event) {
            const file = event.target.files[0];
            if (!file) return;

            // Limit to 5MB
            if (file.size > 5 * 1024 * 1024) {
                alert("Please select a file smaller than 5MB");
                return;
            }

            const email = sessionStorage.getItem("userEmail");
            const formData = new FormData();
            formData.append("image", file);

            try {
                // Show uploading state
                document.getElementById("profile-picture-container").innerText = "⏳";
                document.getElementById("profile-picture-container").style.backgroundImage = "";

                const res = await fetch("https://complaint-backend-5rdk.onrender.com/api/v1/profile/upload-dp", {
                    method: "POST",
                    headers: {
                        "User-Email": email
                    },
                    body: formData
                });

                if (res.ok) {
                    const data = await res.json();
                    alert("Profile Picture Updated! 😊");
                    // Reload the DP
                    initProfile();
                } else {
                    const txt = await res.text();
                    alert("Failed to update picture: " + txt);
                    initProfile(); // Reset on failure
                }
            } catch (err) {
                console.error(err);
                alert("Error connecting to server to upload DP");
                initProfile();
            }
        }

        document.getElementById("passwordForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = sessionStorage.getItem("userEmail");
            const oldPassword = document.getElementById("oldPassword").value;
            const newPassword = document.getElementById("newPassword").value;

            try {
                const res = await fetch("https://complaint-backend-5rdk.onrender.com/api/v1/profile/update", {
                    method: "PATCH",
                    headers: {
                        "Content-Type": "application/json",
                        "User-Email": email
                    },
                    body: JSON.stringify({ oldPassword, newPassword })
                });

                if (res.ok) {
                    alert("Password Changed Successfully! Please login again.");
                    logout();
                } else {
                    const errTxt = await res.text();
                    alert("Failed to change password: " + errTxt);
                }
            } catch (err) {
                console.error(err);
            }
        });

        function goBack() {
            const role = sessionStorage.getItem("userRole");
            if (role === "ADMIN") window.location.href = "admin_dashboard.html";
            else if (role === "STAFF") window.location.href = "staff_dashboard.html";
            else window.location.href = "student_dashboard.html";
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = "login.html";
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateThemeIcon(next);
        }

        function updateThemeIcon(theme) {
            const icon = document.getElementById('themeIcon');
            if (theme === 'dark') {
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>';
            } else {
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>';
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            updateThemeIcon(document.documentElement.getAttribute('data-theme'));
            initProfile();
        });
    </script>
</body>

</html>
