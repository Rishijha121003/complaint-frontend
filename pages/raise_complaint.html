<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raise Complaint | Smart Complaint</title>
    <link rel="stylesheet" href="../css/style.css">
    <script>
        (function () {
            const saved = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', saved);
        })();
    </script>
</head>

<body class="dashboard-body">

    <button class="menu-toggle" id="menu-toggle">☰</button>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>Student Panel</h3>
        </div>
        <nav style="display: flex; flex-direction: column; width: 100%;">
            <a href="student_dashboard.html">🏠 Dashboard</a>
            <a href="raise_complaint.html" class="active">📝 Raise Complaint</a>
            <a href="profile.html">👤 My Profile</a>
            <a href="#" onclick="logout()">🚪 Logout</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="top-navbar">
            <div class="nav-links">
                <a href="student_dashboard.html" class="nav-item">Home</a>
                <a href="raise_complaint.html" class="nav-item active">Raise Complaint</a>
                <a href="profile.html" class="nav-item">Profile</a>
            </div>
            <div class="nav-actions">
                <button class="nav-icon-btn d-mobile-flex" onclick="window.location.href='student_dashboard.html'"
                    style="background: var(--primary); color: white; border: none; padding: 10px 16px; border-radius: 50px; font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 8px;">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 16px; height: 16px;">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                    </svg>
                    Back to Dashboard
                </button>
                <div class="user-profile" onclick="window.location.href='profile.html'">
                    <div class="user-avatar" id="nav-avatar" style="transition: all 0.3s;">U</div>
                    <div
                        style="display: flex; flex-direction: column; align-items: flex-start; justify-content: center; padding-right: 5px;">
                        <span
                            style="font-size: 10px; color: var(--text-muted); line-height: 1; margin-bottom: 3px;">Welcome,</span>
                        <span id="nav-email"
                            style="font-size: 13px; font-weight: 700; line-height: 1;">Loading...</span>
                    </div>
                </div>
                <button class="nav-icon-btn" onclick="toggleTheme()" id="themeToggleBtn" title="Toggle Dark/Light Mode">
                    <svg id="themeIcon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z">
                        </path>
                    </svg>
                </button>
            </div>
        </div>

        <div class="dashboard-header">
            <h2>Raise New Complaint</h2>
            <p style="color: var(--text-muted);">Fill all details to resolve the issue quickly</p>
        </div>

        <div class="login-card"
            style="margin-top: 20px; width: 100%; max-width: 650px; padding: 30px; box-sizing: border-box;">
            <form id="complaintForm">
                <div class="form-group">
                    <label>Complaint Title</label>
                    <input type="text" id="title" placeholder="e.g., Water leakage in washroom" required>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>Category</label>
                        <select id="category" required>
                            <option value="">-- Select Category --</option>
                            <option value="ELECTRICAL">Electricity</option>
                            <option value="PLUMBING">Plumbing</option>
                            <option value="CLEANING">Cleaning</option>
                            <option value="ACADEMIC">Academic</option>
                            <option value="HOSTEL">Hostel</option>
                            <option value="OTHER">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Location (Room/Block)</label>
                        <input type="text" id="location" placeholder="e.g., Room 408" required>
                    </div>
                </div>

                <div class="form-group" style="width: 100%;">
                    <label>Description</label>
                    <textarea id="description" rows="4" placeholder="Describe your problem in detail..." required
                        style="width: 100%; box-sizing: border-box;"></textarea>
                </div>

                <div style="width: 100%;">
                    <button type="submit" class="btn-primary"
                        style="width: 100%; padding: 15px; margin-top: 10px; box-sizing: border-box;">SUBMIT
                        COMPLAINT</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // --- MOBILE MENU LOGIC ---
        const menuBtn = document.getElementById("menu-toggle");
        const sidebar = document.getElementById("sidebar");

        if (menuBtn) {
            menuBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                sidebar.classList.toggle("active");
                menuBtn.innerText = sidebar.classList.contains("active") ? "✕" : "☰";
            });
        }

        document.getElementById("complaintForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            // 1. LocalStorage se credentials uthana
            const email = sessionStorage.getItem("userEmail");

            // Agar login session nahi hai toh wapas login page pe bhejo
            if (!email) {
                alert("Session expired. Please login again.");
                window.location.href = "login.html";
                return;
            }

            const formData = new FormData();
            formData.append("title", document.getElementById("title").value);
            formData.append("category", document.getElementById("category").value);
            formData.append("description", document.getElementById("description").value);
            formData.append("location", document.getElementById("location").value);

            const imageFile = document.getElementById("image").files[0];
            if (imageFile) {
                formData.append("image", imageFile);
            }

            try {
                // Path matches @RequestMapping("/api/student") in StudentController
                const res = await fetch("https://complaint-backend-5rdk.onrender.com/api/student/raise", {
                    method: "POST",
                    headers: {
                        "User-Email": email // Changed to match backend explicitly
                    },
                    body: formData
                });

                if (res.ok) {
                    alert("Complaint Raised Successfully! ✅");
                    window.location.href = "student_dashboard.html";
                } else {
                    const errBody = await res.text();
                    console.error("Error Details:", errBody);
                    alert("Failed to raise complaint: " + errBody);
                }
            } catch (err) {
                console.error("Fetch Error:", err);
                alert("Cannot connect to Backend. Is Spring Boot running?");
            }
        });

        function logout() {
            sessionStorage.clear();
            window.location.href = "login.html";
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateThemeIcon(next);
        }
        function updateThemeIcon(theme) {
            const icon = document.getElementById('themeIcon');
            if (theme === 'dark') {
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>';
            } else {
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>';
            }
        }
        window.addEventListener('DOMContentLoaded', () => {
            updateThemeIcon(document.documentElement.getAttribute('data-theme'));
            const email = sessionStorage.getItem("userEmail");
            if (email) {
                document.getElementById("nav-email").innerText = email;
                document.getElementById("nav-avatar").innerText = email.charAt(0).toUpperCase();
            }
        });
    </script>
</body>

</html>
