<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard | Smart Complaint</title>
    <link rel="stylesheet" href="../css/style.css">
    <script>
        (function () {
            const saved = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', saved);
        })();
    </script>
</head>

<body class="dashboard-body">
    <button class="menu-toggle" id="menu-toggle">☰</button>

    <div class="sidebar" id="sidebar">
        <h3>Staff Panel</h3>
        <a href="staff_dashboard.html" class="active">My Tasks</a>
        <a href="profile.html">Profile</a>
        <a href="#" onclick="logout()">Logout</a>
    </div>

    <div class="main-content">
        <div class="top-navbar">
            <div class="nav-links">
                <a href="staff_dashboard.html" class="nav-item active">Home</a>

                <a href="profile.html" class="nav-item">Profile</a>
            </div>

            <div class="search-container" style="flex: 1; max-width: 400px; margin: 0 20px; position: relative;">
                <input type="text" id="global-search" onkeyup="filterComplaints()"
                    placeholder="Search title, category, or room..."
                    style="width: 100%; padding: 10px 16px 10px 40px; border-radius: 50px; background: rgba(0,0,0,0.05); border: 1px solid var(--border); font-size: 14px; transition: all 0.3s; color: var(--text-strong);">
                <svg style="position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); width: 18px; height: 18px;"
                    fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
            </div>

            <div class="nav-actions">
                <div class="user-profile" onclick="window.location.href='profile.html'">
                    <div class="user-avatar" id="nav-avatar" style="transition: all 0.3s;">U</div>
                    <div
                        style="display: flex; flex-direction: column; align-items: flex-start; justify-content: center; padding-right: 5px;">
                        <span
                            style="font-size: 10px; color: var(--text-muted); line-height: 1; margin-bottom: 3px;">Welcome,
                            Staff</span>
                        <span id="nav-email"
                            style="font-size: 13px; font-weight: 700; line-height: 1;">Loading...</span>
                    </div>
                </div>
                <button class="nav-icon-btn" onclick="toggleTheme()" id="themeToggleBtn" title="Toggle Dark/Light Mode">
                    <svg id="themeIcon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z">
                        </path>
                    </svg>
                </button>
            </div>
        </div>

        <div class="dashboard-header"
            style="display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 15px;">
            <div style="display: flex; flex-direction: column;">
                <h2 style="margin: 0;">Assigned Complaints</h2>
                <p style="color: var(--text-muted); font-size: 14px; margin-top: 4px;">Manage and update your assigned
                    tasks</p>
            </div>
            <div style="display: flex; align-items: center; gap: 15px; flex-wrap: wrap;">
                <select id="statusFilter" onchange="filterComplaints()"
                    style="padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text-strong); outline: none;">
                    <option value="">All Statuses</option>
                    <option value="assigned">Assigned</option>
                    <option value="in_progress">In Progress</option>
                    <option value="resolved">Resolved</option>
                </select>
                <div
                    style="display: flex; align-items: center; padding: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px;">
                    <label
                        style="cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: var(--text-muted);">
                        <input type="checkbox" id="historyToggle" onchange="toggleHistory()"
                            style="accent-color: var(--primary);">
                        Show Past 24h
                    </label>
                </div>
            </div>
        </div>

        <div id="loading" style="text-align: center; margin-top: 20px;">Fetching tasks...</div>

        <div class="complaint-grid" id="staff-container"></div>
    </div>

    <script>
        const menuBtn = document.getElementById("menu-toggle");
        const sidebar = document.getElementById("sidebar");

        menuBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            sidebar.classList.toggle("active");

            // Icon Change (☰ to ✕)
            menuBtn.innerText = sidebar.classList.contains("active") ? "✕" : "☰";

            // Staggered Animation for Links
            const links = sidebar.querySelectorAll("a");
            links.forEach((link, index) => {
                link.style.transitionDelay = sidebar.classList.contains("active") ? `${(index + 1) * 0.1}s` : "0s";
            });
        });

        // Close menu when clicking outside
        document.addEventListener("click", (e) => {
            if (!sidebar.contains(e.target) && !menuBtn.contains(e.target)) {
                sidebar.classList.remove("active");
                menuBtn.innerText = "☰";
            }
        });

        let allStaffComplaints = [];
        let showHistory = false;

        function toggleHistory() {
            showHistory = document.getElementById("historyToggle").checked;
            displayStaffTasks(allStaffComplaints);
        }

        async function initStaff() {
            const email = sessionStorage.getItem("userEmail");
            if (!email) {
                window.location.href = "login-v2.html";
                return;
            }

            try {
                const res = await fetch("https://complaint-backend-5rdk.onrender.com/api/v1/complaints/staff/assigned", {
                    headers: { "User-Email": email }
                });

                if (!res.ok) throw new Error("Server Error: " + res.status);

                allStaffComplaints = await res.json();
                displayStaffTasks(allStaffComplaints);
            } catch (err) {
                console.error(err);
                document.getElementById("loading").innerText = "Error loading tasks! Is Backend running?";
            }
        }

        function displayStaffTasks(complaints) {
            const container = document.getElementById("staff-container");
            const loading = document.getElementById("loading");
            loading.style.display = "none";
            container.innerHTML = "";

            if (complaints.length === 0) {
                container.innerHTML = "<p style='grid-column: 1/-1; text-align:center;'>No tasks assigned.</p>";
                return;
            }

            complaints.forEach(c => {
                const status = c.status ? c.status.toLowerCase() : 'open';

                // Logic for hiding CLOSED complaints after 24 hours
                if (c.status === 'CLOSED') {
                    const actionDate = c.updatedAt ? new Date(c.updatedAt) : (c.createdAt ? new Date(c.createdAt) : new Date());
                    const today = new Date();
                    const diffInHours = (today - actionDate) / (1000 * 60 * 60);

                    // Allow skipping only if we don't want to show history
                    if (diffInHours >= 24 && !showHistory) {
                        return;
                    }
                }

                let buttonsHtml = '';
                if (c.status !== 'RESOLVED' && c.status !== 'CLOSED') {
                    if (c.status !== 'IN_PROGRESS') {
                        buttonsHtml += `<button onclick="updateStatus(${c.id}, 'IN_PROGRESS')" class="btn-primary" style="background:#1d4ed8; padding:10px; font-size:13px; flex:1;">Start Work</button>`;
                    } else {
                        buttonsHtml += `
                        <div style="width: 100%; display: flex; flex-direction: column; gap: 10px; background: var(--surface); padding: 15px; border-radius: 8px; border: 1px solid var(--border);">
                            <label style="font-weight: 500; font-size: 13px;">Proof of Resolution</label>
                            <input type="text" id="remark-${c.id}" placeholder="What did you fix?" style="padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-body); color: var(--text-strong);">
                            <input type="file" id="evidence-${c.id}" accept="image/*" style="font-size: 12px; padding: 5px;">
                            <button onclick="resolveWithEvidence(${c.id})" class="btn-primary" style="background:#059669; padding:10px; width: 100%; cursor: pointer;">Mark Resolved</button>
                        </div>`;
                    }
                } else if (c.status === 'RESOLVED') {
                    buttonsHtml += `<div class="card-footer-text" style="color: var(--success);">✅ Resolved (Awaiting confirmation)</div>`;
                } else if (c.status === 'CLOSED') {
                    buttonsHtml += `<div class="card-footer-text" style="color: var(--text-muted);">🔒 Closed (Confirmed by student)</div>`;
                }

                let badgeClass = status.replace('_', '-');

                container.innerHTML += `
            <div class="complaint-box badge-${badgeClass}" data-status="${status}">
                <div class="card-header">
                   <h4 class="card-title">${c.title}</h4>
                   <span class="card-status-badge">${c.status ? c.status.toUpperCase() : 'OPEN'}</span>
                </div>
                <div class="card-meta-container">
                    <div class="card-meta-item">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"></path></svg>
                        ${c.category || 'Maintenance'}
                    </div>
                    <div class="card-meta-item">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        ${new Date(c.createdAt || Date.now()).toLocaleDateString()}
                    </div>
                </div>
                <p class="card-desc">${c.description}</p>
                <!-- Show Evidences if present -->
                ${c.imageUrl ? `<div style="margin-top: 10px;"><a href="https://complaint-backend-5rdk.onrender.com${c.imageUrl}" target="_blank"><img src="https://complaint-backend-5rdk.onrender.com${c.imageUrl}" style="max-width: 100%; border-radius: 8px; max-height: 200px; object-fit: cover; border: 1px solid var(--border);" alt="Student Image"></a></div>` : ""}
                ${c.resolvedImageUrl ? `<div style="margin-top: 10px; padding: 10px; background: #ecfdf5; border-radius: 8px; border: 1px solid #10b981;"><p style="font-size: 12px; color: #047857; margin-bottom: 5px;"><strong>Staff Proof:</strong></p><a href="https://complaint-backend-5rdk.onrender.com${c.resolvedImageUrl}" target="_blank"><img src="https://complaint-backend-5rdk.onrender.com${c.resolvedImageUrl}" style="max-width: 100%; border-radius: 8px; max-height: 200px; object-fit: cover; border: 1px solid #a7f3d0;" alt="Staff Proof"></a></div>` : ""}
                ${c.staffRemark ? `<div style="margin-top: 10px; padding: 10px; background: #f3f4f6; border-left: 3px solid #6b7280; font-size: 13px;"><strong>Staff Remark:</strong> ${c.staffRemark}</div>` : ""}
                
                <div class="card-footer" style="display:flex; flex-direction:row; justify-content:space-between; align-items:center; width: 100%;">
                    ${buttonsHtml}
                </div>
                
                <!-- COMMENTS SECTION -->
                <div class="card-footer" style="padding-top: 10px; border-top: 1px dotted var(--border);">
                    <button class="btn-secondary" style="width: 100%; padding: 8px; font-size: 13px; font-weight: 600;" onclick="toggleComments(${c.id})">💬 Discussion / Comments</button>
                    
                    <div id="chatbox-${c.id}" class="chat-container">
                        <div id="chat-messages-${c.id}" class="chat-messages">
                            <!-- Messages will load here -->
                            <div style="text-align: center; color: var(--text-muted); font-size: 12px;">Loading comments...</div>
                        </div>
                        <div class="chat-input-area">
                            <input type="text" id="chat-input-${c.id}" class="chat-input" placeholder="Type a message..." onkeypress="handleChatKeypress(event, ${c.id})">
                            <button class="chat-send-btn" onclick="postComment(${c.id})">
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 18px; margin-left: 2px;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                            </button>
                        </div>
                    </div>
                </div>

            </div>`;
            });
        }

        async function toggleComments(complaintId) {
            const chatbox = document.getElementById(`chatbox-${complaintId}`);
            if (chatbox.style.display === "flex") {
                chatbox.style.display = "none";
            } else {
                chatbox.style.display = "flex";
                await fetchComments(complaintId);
            }
        }

        async function fetchComments(complaintId) {
            const container = document.getElementById(`chat-messages-${complaintId}`);
            try {
                const res = await fetch(`https://complaint-backend-5rdk.onrender.com/api/v1/comments/${complaintId}`);
                if (!res.ok) throw new Error("Failed to fetch comments");
                const comments = await res.json();

                container.innerHTML = "";
                if (comments.length === 0) {
                    container.innerHTML = "<div style='text-align: center; color: var(--text-muted); font-size: 12px; margin-top: 10px;'>No comments yet. Start the discussion!</div>";
                    return;
                }

                comments.forEach(c => {
                    const picUrl = c.senderProfilePic ? `https://complaint-backend-5rdk.onrender.com${c.senderProfilePic}` : '';
                    const initial = c.senderName ? c.senderName.charAt(0).toUpperCase() : 'U';
                    const isStaff = c.senderRole === 'STAFF';
                    const isAdmin = c.senderRole === 'ADMIN';

                    let roleBadge = "Student";
                    let roleColor = "var(--primary)";
                    let roleBg = "var(--primary-light)";
                    if (isStaff) { roleBadge = "Staff"; roleColor = "#047857"; roleBg = "#d1fae5"; }
                    if (isAdmin) { roleBadge = "Admin"; roleColor = "#b91c1c"; roleBg = "#fee2e2"; }

                    const avatarStyle = picUrl ? `background-image: url('${picUrl}');` : '';
                    const avatarContent = picUrl ? '' : initial;

                    container.innerHTML += `
                        <div class="chat-message">
                            <div class="chat-message-avatar" style="${avatarStyle}">${avatarContent}</div>
                            <div class="chat-bubble">
                                <div class="chat-bubble-header">
                                    <span class="chat-sender-name">${c.senderName} <span class="chat-sender-role" style="color:${roleColor}; background:${roleBg}">${roleBadge}</span></span>
                                    <span class="chat-time">${new Date(c.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                                </div>
                                <div style="color: var(--text-strong);">${c.text}</div>
                            </div>
                        </div>
                    `;
                });
                container.scrollTop = container.scrollHeight;
            } catch (err) {
                console.error(err);
                container.innerHTML = "<div style='color: red; font-size: 12px;'>Error loading comments</div>";
            }
        }

        async function postComment(complaintId) {
            const input = document.getElementById(`chat-input-${complaintId}`);
            const text = input.value.trim();
            if (!text) return;

            const email = sessionStorage.getItem("userEmail");

            try {
                input.disabled = true;
                const res = await fetch(`https://complaint-backend-5rdk.onrender.com/api/v1/comments/${complaintId}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'User-Email': email
                    },
                    body: JSON.stringify({ text: text })
                });

                if (res.ok) {
                    input.value = "";
                    await fetchComments(complaintId);
                } else {
                    alert("Failed to post comment");
                }
            } catch (e) { console.error(e); }
            finally {
                input.disabled = false;
                input.focus();
            }
        }

        function handleChatKeypress(event, complaintId) {
            if (event.key === 'Enter') {
                postComment(complaintId);
            }
        }

        // Handle standard status update (For IN_PROGRESS)
        async function updateStatus(id, newStatus) {
            const email = sessionStorage.getItem("userEmail");

            try {
                const res = await fetch(`https://complaint-backend-5rdk.onrender.com/api/v1/complaints/staff/update-status/${id}?status=${newStatus}`, {
                    method: "PATCH",
                    headers: { "User-Email": email }
                });

                if (res.ok) {
                    alert("Status Updated! ✅");
                    initStaff();
                } else {
                    const errorText = await res.text();
                    alert("Update Failed: " + errorText);
                }
            } catch (err) { console.error(err); }
        }

        async function resolveWithEvidence(id) {
            const email = sessionStorage.getItem("userEmail");
            const remark = document.getElementById(`remark-${id}`).value;
            const fileInput = document.getElementById(`evidence-${id}`);

            const formData = new FormData();
            if (remark) formData.append("remark", remark);
            if (fileInput.files[0]) formData.append("image", fileInput.files[0]);

            try {
                const res = await fetch(`https://complaint-backend-5rdk.onrender.com/api/v1/complaints/staff/resolve/${id}`, {
                    method: "POST",
                    headers: { "User-Email": email },
                    body: formData
                });

                if (res.ok) {
                    alert("Ticket Resolved with Proof! ✅");
                    initStaff();
                } else {
                    const errorText = await res.text();
                    alert("Update Failed: " + errorText);
                }
            } catch (err) {
                console.error(err);
                alert("Server error during upload");
            }
        }

        function logout() { sessionStorage.clear(); window.location.href = "login-v2.html"; }
        document.addEventListener("DOMContentLoaded", initStaff);

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateThemeIcon(next);
        }
        function updateThemeIcon(theme) {
            const icon = document.getElementById('themeIcon');
            if (theme === 'dark') {
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>';
            } else {
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9 0 0012 21a9.003 9 0 008.354-5.646z"></path>';
            }
        }
        window.addEventListener('DOMContentLoaded', () => {
            updateThemeIcon(document.documentElement.getAttribute('data-theme'));
            const email = sessionStorage.getItem("userEmail");
            if (email) {
                document.getElementById("nav-email").innerText = email;
                document.getElementById("nav-avatar").innerText = email.charAt(0).toUpperCase();
            }
        });

        // --- GLOBAL SEARCH LOGIC ---
        function filterComplaints() {
            const query = document.getElementById("global-search").value.toLowerCase();
            const statusFilterInput = document.getElementById("statusFilter");
            const statusFilter = statusFilterInput ? statusFilterInput.value.toLowerCase() : "";
            const cards = document.querySelectorAll(".complaint-box");
            let visibleCount = 0;

            cards.forEach(card => {
                const textContent = card.innerText.toLowerCase();
                const cardStatus = card.getAttribute("data-status") || "";

                const matchesQuery = query === "" || textContent.includes(query);
                const matchesStatus = statusFilter === "" || cardStatus === statusFilter;

                if (matchesQuery && matchesStatus) {
                    card.style.display = "flex";
                    visibleCount++;
                } else {
                    card.style.display = "none";
                }
            });

            const container = document.getElementById("staff-container");
            let noResultMsg = document.getElementById("no-search-result");

            if (visibleCount === 0 && query !== "") {
                if (!noResultMsg) {
                    const msg = document.createElement('p');
                    msg.id = "no-search-result";
                    msg.style.cssText = "grid-column: 1/-1; text-align:center; color: var(--text-muted); padding: 40px; border: 1px dashed var(--border); border-radius: 12px;";
                    msg.innerText = `No complaints found matching "${query}"`;
                    container.appendChild(msg);
                } else {
                    noResultMsg.innerText = `No complaints found matching "${query}"`;
                    noResultMsg.style.display = "block";
                }
            } else if (noResultMsg) {
                noResultMsg.style.display = "none";
            }
        }
    </script>
</body>

</html>
