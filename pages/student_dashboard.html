<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Center | Smart Complaint</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap"
        rel="stylesheet">
    <script>
        (function () {
            const saved = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', saved);
        })();
    </script>
</head>

<body class="dashboard-body">
    <button class="menu-toggle" id="menu-toggle"><i class="fa-solid fa-bars"></i></button>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <i class="fa-solid fa-graduation-cap"></i>
                <span>Student Hub</span>
            </div>
        </div>

        <nav>
            <a href="student_dashboard.html" class="nav-item active">
                <i class="fa-solid fa-house-user"></i>
                <span>Summary View</span>
            </a>
            <a href="raise_complaint.html" class="nav-item">
                <i class="fa-solid fa-circle-plus"></i>
                <span>Report Issue</span>
            </a>
            <a href="profile.html" class="nav-item">
                <i class="fa-solid fa-id-badge"></i>
                <span>My Profile</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="profile-card">
                <div class="profile-main">
                    <div class="profile-avatar" id="sidebar-avatar">S</div>
                    <div class="profile-info">
                        <span class="profile-name" id="sidebar-name">Student</span>
                        <span class="profile-email" id="sidebar-email">student@system.com</span>
                    </div>
                </div>
                <button class="logout-btn" onclick="logout()">
                    <i class="fa-solid fa-power-off"></i>
                    <span>Log Out</span>
                </button>
            </div>
        </div>
    </div>

    <div class="main-content">
        <header class="top-nav">
            <div class="header-left">
                <h1 class="view-title">My Tickets</h1>
                <p class="view-subtitle" id="current-date">Track and manage your submitted concerns</p>
            </div>

            <div class="header-right">
                <div class="search-bar">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="Find ticket by title or ID..." onkeyup="filterComplaints()">
                </div>
                <button class="theme-toggle" onclick="toggleTheme()"><i
                        class="fa-solid fa-circle-half-stroke"></i></button>
            </div>
        </header>

        <!-- Premium Stats Section -->
        <div class="admin-stats-grid"
            style="margin-top: 32px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px;">
            <div class="premium-stat-card">
                <div class="stat-icon" style="background: rgba(99, 102, 241, 0.1); color: var(--primary);"><i
                        class="fa-solid fa-paper-plane"></i></div>
                <div class="stat-info">
                    <label>Total Raised</label>
                    <h2 id="stat-total">0</h2>
                </div>
            </div>

            <div class="premium-stat-card">
                <div class="stat-icon" style="background: rgba(245, 158, 11, 0.1); color: #f59e0b;"><i
                        class="fa-solid fa-hourglass-start"></i></div>
                <div class="stat-info">
                    <label>In Process</label>
                    <h2 id="stat-active">0</h2>
                </div>
            </div>

            <div class="premium-stat-card">
                <div class="stat-icon" style="background: rgba(34, 197, 94, 0.1); color: #22c55e;"><i
                        class="fa-solid fa-check-double"></i></div>
                <div class="stat-info">
                    <label>Resolved</label>
                    <h2 id="stat-resolved">0</h2>
                </div>
            </div>
        </div>

        <!-- Complaints Table Section -->
        <div class="table-container" style="margin-top: 40px; padding-bottom: 40px;">
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 24px;">
                <h3 style="font-family: 'Outfit'; font-size: 20px; font-weight: 800; color: var(--text-strong);">
                    Tracking Registry</h3>
                <div style="display: flex; gap: 12px; align-items: center;">
                    <label
                        style="font-size: 13px; font-weight: 700; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; gap: 8px;">
                        <input type="checkbox" id="historyToggle" onchange="toggleHistory()"
                            style="accent-color: var(--primary);"> Show Historical Archive
                    </label>
                </div>
            </div>

            <table class="complaints-table">
                <thead>
                    <tr id="table-header-row">
                        <th style="padding-left: 24px; width: 80px;">ID</th>
                        <th>Subject & Issue Detail</th>
                        <th style="width: 150px;">Category</th>
                        <th style="width: 150px;">Status</th>
                        <th style="padding-right: 24px; text-align: right; width: 220px;">Support & Actions</th>
                    </tr>
                </thead>
                <tbody id="complaint-container">
                    <!-- Tickets injected via JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="../js/student-v1.js"></script>
    <script>
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        }
    </script>
</body>

</html>
