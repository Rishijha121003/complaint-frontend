<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Center | GRIEVLY</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap"
        rel="stylesheet">
    <script src="../js/config.js"></script>
    <script>UI.initTheme();</script>
</head>

<body class="dashboard-body">


    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo" style="display: flex; align-items: center; gap: 12px; cursor: pointer;">
                <img src="../assets/G-Logo-V2.png" alt="GLogo"
                    style="height: 44px; width: auto; filter: drop-shadow(0px 0px 10px rgba(0, 198, 255, 0.4));">
                <span
                    style="font-family: 'Outfit', sans-serif; font-size: 26px; font-weight: 800; background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 1px;">GRIEVLY</span>
            </div>
        </div>

        <nav class="sidebar-nav" id="sidebar-nav">
            <a href="student_dashboard.html" class="nav-item active">
                <i class="fa-solid fa-house-user"></i>
                <span>Summary View</span>
            </a>
            <a href="raise_complaint.html" class="nav-item">
                <i class="fa-solid fa-circle-plus"></i>
                <span>Report Issue</span>
            </a>
            <a href="profile.html" class="nav-item">
                <i class="fa-solid fa-id-badge"></i>
                <span>My Profile</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="profile-card" onclick="window.location.href='profile.html'" style="cursor: pointer; background: rgba(15, 23, 42, 0.6); border: 1.5px solid var(--border); padding: 20px; transition: var(--transition); border-radius: 16px;" title="View Your Profile">
                <div class="profile-main" style="display: flex; align-items: center; gap: 16px;">
                    <div class="avatar" id="sidebar-avatar" style="width: 48px; height: 48px; min-width: 48px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 800; color: white;">S</div>
                    <div class="profile-info" style="flex: 1; display: flex; flex-direction: column; gap: 2px;">
                        <div style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
                            <span class="profile-name" id="sidebar-name" style="font-size: 15px; font-weight: 800; color: var(--text-strong); letter-spacing: -0.01em;">Student</span>
                            <button class="theme-toggle" onclick="event.stopPropagation(); UI.toggleTheme()" style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: whitesmoke; cursor: pointer; width: 32px; height: 32px; border-radius: 10px; display: flex !important; align-items: center; justify-content: center; transition: var(--transition);">
                                <i class="fa-solid fa-moon"></i>
                            </button>
                        </div>
                        <span id="sidebar-email" style="font-size: 12px; color: var(--text-muted); font-weight: 600; opacity: 0.7;">student@system.com</span>
                    </div>
                </div>
                
                <button class="logout-btn" onclick="event.stopPropagation(); logout()" style="width: 100%; margin-top: 18px; padding: 12px; border-radius: 12px; border: 1.5px solid rgba(239, 68, 68, 0.2); background: rgba(239, 68, 68, 0.05); color: #ef4444; font-weight: 800; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: var(--transition);">
                    <i class="fa-solid fa-power-off"></i>
                    <span>Secure Logout</span>
                </button>
            </div>
        </div>
    </div>


    <div class="main-content">
        <header class="top-nav flex-between">
            <div class="header-left" style="display: flex; align-items: center; gap: 16px;">
                <button class="menu-toggle" id="menu-toggle">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <div class="titles-wrapper" style="margin-left: 0;">
                    <h1 class="view-title" style="font-size: 18px; margin: 0;">My Tickets</h1>
                    <p class="view-subtitle hidden-mobile" id="current-date" style="font-size: 12px; margin: 0;">Status Feed</p>
                </div>
            </div>
            <div class="header-right">

                <!-- Premium Quick Shortcut to Raise Complaint -->
                <button class="quick-action-btn primary" onclick="window.location.href='raise_complaint.html'"
                    title="Raise New Ticket">
                    <i class="fa-solid fa-plus-circle"></i>
                </button>
                <button class="theme-toggle" onclick="UI.toggleTheme()"><i class="fa-solid fa-moon"></i></button>
            </div>
        </header>

        <!-- Premium Stats Section -->
        <div class="admin-stats-grid" style="margin-top: 32px;">
            <div class="premium-stat-card">
                <div class="stat-icon" style="background: rgba(99, 102, 241, 0.1); color: var(--primary);"><i
                        class="fa-solid fa-paper-plane"></i></div>
                <div class="stat-info">
                    <label>Total Raised</label>
                    <h2 id="stat-total">0</h2>
                </div>
            </div>

            <div class="premium-stat-card">
                <div class="stat-icon" style="background: rgba(245, 158, 11, 0.1); color: #f59e0b;"><i
                        class="fa-solid fa-hourglass-start"></i></div>
                <div class="stat-info">
                    <label>In Process</label>
                    <h2 id="stat-active">0</h2>
                </div>
            </div>

            <div class="premium-stat-card">
                <div class="stat-icon" style="background: rgba(34, 197, 94, 0.1); color: #22c55e;"><i
                        class="fa-solid fa-check-double"></i></div>
                <div class="stat-info">
                    <label>Resolved</label>
                    <h2 id="stat-resolved">0</h2>
                </div>
            </div>
        </div>

        <!-- Complaints Table Section -->
        <div class="table-container" style="margin-top: 40px; padding-bottom: 40px;">
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 24px;">
                <h3 style="font-family: 'Outfit'; font-size: 20px; font-weight: 800; color: var(--text-strong);">
                    Ticket Status Feed</h3>
                <div style="display: flex; gap: 12px; align-items: center;">
                    <label
                        style="font-size: 13px; font-weight: 700; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; gap: 8px;">
                        <input type="checkbox" id="historyToggle" onchange="toggleHistory()"
                            style="accent-color: var(--primary);"> Show Historical Archive
                    </label>
                </div>
            </div>

            <table class="complaints-table">
                <thead>
                    <tr id="table-header-row">
                        <th style="padding-left: 24px; width: 80px;">ID</th>
                        <th>Subject & Issue Detail</th>
                        <th style="width: 150px;">Category</th>
                        <th style="width: 150px;">Status</th>
                        <th style="padding-right: 24px; text-align: right; width: 220px;">Support & Actions</th>
                    </tr>
                </thead>
                <tbody id="complaint-container">
                    <!-- Tickets injected via JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="../js/student-v1.js"></script>
    <script>
        function logout() { UI.logout(); }
    </script>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="UI.closeSidebar()"></div>
</body>



</html>
